<!-- Hero -->
<header class="contact-hero">
    <div class="container">
        <h1 class="display-4 fw-bold">تواصل معنا</h1>
        <p class="lead text-white-50">هل لديك استفسار أو اقتراح؟ نحن هنا لمساعدتك</p>
    </div>
</header>

<!-- Contact Form -->
<div class="container mb-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card-custom">
                <h3 class="fw-bold mb-4">أرسل رسالة</h3>

                <form>
                    <div class="row g-4">
                        <div class="col-md-6">
                            <label class="form-label">الاسم الكامل</label>
                            <input type="text" class="form-control" placeholder="أدخل اسمك" required>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">البريد الإلكتروني</label>
                            <input type="email" class="form-control" placeholder="example@email.com" required>
                        </div>

                        <div class="col-12">
                            <div class="p-3 bg-light rounded-4 border">
                                <div class="form-check">
                                    <input type="checkbox" class="form-check-input" id="charityCheck">
                                    <label class="form-check-label fw-bold text-success ms-2">
                                        أمثل جمعية خيرية أو دار أيتام
                                    </label>
                                </div>
                            </div>
                        </div>

                        <div class="col-12">
                            <label class="form-label">موضوع الرسالة</label>
                            <select class="form-select">
                                <option>استفسار عام</option>
                                <option>دعم الجمعيات الخيرية</option>
                                <option>طلبات بالجملة</option>
                                <option>شراكة</option>
                            </select>
                        </div>

                        <div class="col-12">
                            <label class="form-label">رسالتك</label>
                            <textarea class="form-control" rows="5" placeholder="اكتب رسالتك هنا..."></textarea>
                        </div>

                        <div class="col-12">
                            <button class="btn btn-success btn-lg w-100 rounded-pill">
                                إرسال <i class="fas fa-paper-plane ms-2"></i>
                            </button>
                        </div>
                    </div>
                </form>

            </div>
        </div>
    </div>
</div>

<footer class="main-footer text-center">
